<!DOCTYPE html>

<html lang="en">
<head>
    <link rel="stylesheet" href="calculator.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
</head>


<body>
    <div class="mainGrid">
        <div></div>
        
            <div class="displayHolder">
                <div></div>
                <div></div>
                <div></div>
                <div></div>
                <div class="display"id="expression"></div>
                <div class="display"id="result"></div>
            </div>
            
            <div></div>
            <div></div>

        <div class="calculatorGrid">
            
            <button class="operatorBtn" id="addBtn">+</button>
            <button class="operatorBtn" id="subBtn">-</button>
            <button class="operatorBtn" id="multBtn">*</button>
            <button class="operatorBtn" id="divBtn">/</button>
            <button class="operatorBtn" id="calcBtn">=</button>

            <button class="mainBtns" id="oneBtn">1</button>
            <button class="mainBtns" id="twoBtn">2</button>
            <button class="mainBtns" id="threeBtn">3</button>
            <button class="mainBtns" id="fourBtn">4</button>

            <div></div>

            <button class="mainBtns" id="fiveBtn">5</button>
            <button class="mainBtns" id="sixBtn">6</button>
            <button class="mainBtns" id="sevenBtn">7</button>
            <button class="mainBtns" id="eightBtn">8</button>

            <div></div>

            <button class="mainBtns" id="nineBtn">9</button>
            <button class="mainBtns" id="zeroBtn">0</button>
            <button class="mainBtns" id="decimalBtn">.</button>

            <button class="clearBtn"id="clearBtn">CLR</button>
        </div>

        <div></div>
        <div></div>
        <div></div>
        <div></div>

    </div>



    <script src="calculator.js"></script>

</body>
</html>
